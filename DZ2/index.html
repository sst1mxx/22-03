<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
      .block {
        position: relative;
        width: 500px;
        height: 500px;
        border: 1px solid;
      }
      .box {
        position: absolute;
        width: 50px;
        height: 50px;
        background-color: red;
      }
    </style>
</head>
<body>
  <div class="block">
      <div class="box"></div>
  </div>
    <div class="timer">
        <button class="start">Start</button>
        <span class="resultTime"></span>
        <button class="stop">Stop</button>
    </div>
</body>
<script src="app.js"></script>
</html>
